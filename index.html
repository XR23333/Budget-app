<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Web App | javascript</title>
    <link href="./style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div class="budget-container">
      <div class="app-title">
        <a href="">Budget<b>App</b></a>
        <div class="language-switcher" aria-label="Language switcher">
          <button type="button" class="lang-btn" data-lang="en">EN</button>
          <button type="button" class="lang-btn" data-lang="zh">中文</button>
        </div>
        <div class="currency-switcher">
          <button class="currency-btn" data-currency="USD">$</button>
          <button class="currency-btn" data-currency="CNY">¥</button>
        </div>
      </div>
      <div class="budget-header">
        <div class="balance">
          <div class="title" data-i18n="balance">Balance</div>
          <div class="value"><small>$</small>0</div>
        </div>
        <div class="account">
          <div class="income">
            <div class="title" data-i18n="income">Income</div>
            <div class="income-total"><small>$</small>0</div>
          </div>
          <div class="chart"></div>
          <div class="outcome">
            <div class="title" data-i18n="outcome">Outcome</div>
            <div class="outcome-total"><small>$</small>0</div>
          </div>
        </div>
      </div>
      <div class="budget-dashboard">
        <div class="dash-title" data-i18n="dashboard">Dashboard</div>
        <div class="toggle">
          <div class="first-tab" data-i18n="expenses">Expenses</div>
          <div class="second-tab" data-i18n="income">Income</div>
          <div class="third-tab focus" data-i18n="all">All</div>
        </div>
        <div class="hide" id="expense">
          <ul class="list"></ul>
          <div class="input">
            <input
              type="text"
              id="expense-title-input"
              name="title"
              placeholder="title"
              data-i18n-placeholder="titlePlaceholder"
            />
            <input
              type="number"
              id="expense-amount-input"
              name="amount"
              min="0.01"
              step="0.01"
              required
              placeholder="$0"
            />
            <div class="add-expense"><img src="icon/plus.png" alt="+" /></div>
          </div>
        </div>
        <div class="hide" id="income">
          <ul class="list"></ul>
          <div class="input">
            <input
              type="text"
              id="income-title-input"
              name="title"
              placeholder="title"
              data-i18n-placeholder="titlePlaceholder"
            />
            <input
              type="number"
              id="income-amount-input"
              name="amount"
              min="0.01"
              step="0.01"
              required
              placeholder="$0"
            />
            <div class="add-income"><img src="icon/plus.png" alt="+" /></div>
          </div>
        </div>
        <div id="all">
          <ul class="list"></ul>
        </div>
      </div>
    </div>

    <div id="cookie-banner" class="cookie-banner hide">
        <div class="cookie-content">
            <p data-i18n="cookieText">🍪 We use cookies and local storage to save your budget data securely on your device.</p>
        </div>
        <button id="accept-cookies" data-i18n="gotIt">Got it!</button>
    </div>

    <script src="./chart.js"></script>
    <script src="./budget.js"></script>
  </body>
</html>
